// ─────────────────────────────────────────
// TYPEWRITER COMPONENT
// ─────────────────────────────────────────
const TypewriterText = ({ text, speed, skip, onDone }) => {
  const spd = speed || 26;
  const [count, setCount] = useState(0);

  useEffect(() => { setCount(0); }, [text]);

  useEffect(() => {
    if (skip) { setCount(text.length); return; }
    if (count >= text.length) { if (onDone) onDone(); return; }
    const t = setTimeout(() => setCount(function(c){ return c + 1; }), spd);
    return function(){ clearTimeout(t); };
  }, [count, skip, text]);

  const shown = text.slice(0, count);
  const complete = count >= text.length;
  const parts = shown.split('\n\n');

  return (
    <span>
      {parts.map(function(para, i) {
        return (
          <React.Fragment key={i}>
            {i > 0 && <div style={{marginBottom:10}}/>}
            <span>{para}</span>
          </React.Fragment>
        );
      })}
      {!complete && (
        <span style={{
          display:'inline-block', marginLeft:1, color:'#f59e0b', fontWeight:400,
          animation:'twBlink 0.8s ease-in-out infinite'
        }}>|</span>
      )}
    </span>
  );
};

// ── Learning Phase ────────────────────────
const LearningPhase = ({ scenario, onNext }) => {
  const [current, setCurrent] = useState(0);
  const [revealed, setRevealed] = useState(new Set([0]));

  const advance = () => {
    if (current < scenario.steps.length - 1) {
      const next = current + 1;
      setCurrent(next);
      setRevealed(prev => new Set([...prev, next]));
    }
  };

  const done = current === scenario.steps.length - 1;

  return (
    <div className="anim-fade">
      <div style={{background:'#1e293b', borderRadius:20, padding:16, marginBottom:14, border:'1px solid #334155'}}>
        <div style={{color:'#f59e0b', fontSize:12, fontWeight:700, marginBottom:4}}>📋 正確應對流程</div>
        <div style={{color:'#475569', fontSize:11}}>
          步驟 {Math.min(current+1, scenario.steps.length)} ／ {scenario.steps.length}
        </div>
      </div>
      <div style={{display:'flex', flexDirection:'column', gap:8, marginBottom:14}}>
        {scenario.steps.map((step, i) => {
          const isRevealed = revealed.has(i);
          const isCurrent = i === current;
          return (
            <div key={i} style={{
              borderRadius:18, padding:14, border:`1px solid ${isCurrent ? '#f59e0b' : isRevealed ? '#334155' : '#1e293b'}`,
              background: isCurrent ? 'rgba(245,158,11,0.12)' : isRevealed ? '#1e293b' : 'rgba(30,41,59,0.4)',
              opacity: isRevealed ? 1 : 0.25, transition:'all 0.35s ease',
            }}>
              <div style={{display:'flex', alignItems:'flex-start', gap:12}}>
                <div style={{
                  width:32, height:32, borderRadius:'50%', display:'flex',
                  alignItems:'center', justifyContent:'center', flexShrink:0,
                  fontSize:14, fontWeight:800,
                  background: isRevealed ? '#f59e0b' : '#334155',
                  color: isRevealed ? '#000' : '#64748b',
                }}>
                  {isRevealed ? step.icon : i+1}
                </div>
                <div style={{flex:1}}>
                  <div style={{color:'white', fontWeight:700, fontSize:13, marginBottom:3}}>{step.title}</div>
                  <div style={{color:'#94a3b8', fontSize:11, lineHeight:1.6}}>{step.desc}</div>
                  {isCurrent && (function(){
                    const StepAnim = (STEP_ANIMS[scenario.id] || [])[i];
                    return StepAnim ? (
                      <div className="anim-fade" style={{
                        marginTop:12, height:165, borderRadius:12, overflow:'hidden',
                        border:'1px solid rgba(245,158,11,0.3)', background:'#0f172a',
                      }}>
                        <StepAnim />
                      </div>
                    ) : null;
                  })()}
                </div>
              </div>
            </div>
          );
        })}
      </div>
      {!done ? (
        <button onClick={advance} style={{
          width:'100%', padding:'14px', borderRadius:20, fontWeight:800, fontSize:15,
          color:'#000', border:'none', cursor:'pointer',
          background:'linear-gradient(135deg,#f59e0b,#d97706)',
        }}>

        </button>
      ) : (
        <button onClick={onNext} style={{
          width:'100%', padding:'16px', borderRadius:20, fontWeight:800, fontSize:16,
          color:'#000', border:'none', cursor:'pointer',
          background:'linear-gradient(135deg,#22c55e,#16a34a)',

// ── Quiz Phase ────────────────────────────
const QuizPhase = ({ scenario, onComplete }) => {
  const [qIdx, setQIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [answers, setAnswers] = useState([]);
  const q = scenario.quiz[qIdx];

  const pick = (i) => { if (selected === null) setSelected(i); };

  const next = () => {
    const newAnswers = [...answers, selected === q.correct];
    if (qIdx < scenario.quiz.length - 1) {
      setAnswers(newAnswers);
      setQIdx(qIdx + 1);
      setSelected(null);
    } else {
      onComplete(newAnswers.filter(Boolean).length, newAnswers.length);
    }
  };

  const optionStyle = (i) => {
    let bg = '#1e293b', border = '#334155', color = '#e2e8f0';
    if (selected !== null) {
      if (i === q.correct) { bg='rgba(21,128,61,0.25)'; border='#16a34a'; color='#bbf7d0'; }
      else if (i === selected) { bg='rgba(185,28,28,0.25)'; border='#dc2626'; color='#fecaca'; }
      else { bg='rgba(30,41,59,0.4)'; color='#475569'; }
    }
    return {bg, border, color};
  };

  const optLabel = (i, sel, correct) => {
    if (sel === null) return String.fromCharCode(65+i);
    if (i === correct) return '✓';
    if (i === sel) return '✗';
    return String.fromCharCode(65+i);
  };

  return (
    <div className="anim-fade">
      <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:16}}>
        <span style={{color:'#64748b', fontSize:12}}>第 {qIdx+1} 題 ／ 共 {scenario.quiz.length} 題</span>
        <div style={{display:'flex', gap:6}}>
          {scenario.quiz.map((_, i) => (
            <div key={i} style={{
              width:28, height:6, borderRadius:3,
              background: i < qIdx ? '#22c55e' : i === qIdx ? '#f59e0b' : '#334155',
              transition:'background 0.3s',
            }}/>
          ))}
        </div>
      </div>
      <div style={{background:'#1e293b', borderRadius:20, padding:18, marginBottom:14, border:'1px solid #334155'}}>
        <div style={{color:'#f59e0b', fontSize:12, fontWeight:700, marginBottom:8}}>📝 測驗</div>
        <p style={{color:'white', fontWeight:700, fontSize:14, lineHeight:1.65, margin:0}}>{q.question}</p>
      </div>
      <div style={{display:'flex', flexDirection:'column', gap:8, marginBottom:14}}>
        {q.options.map((opt, i) => {
          const s = optionStyle(i);
          return (
            <button key={i} onClick={() => pick(i)} style={{
              display:'flex', alignItems:'center', gap:12, padding:'12px 16px',
              background:s.bg, borderRadius:16, border:`1px solid ${s.border}`,
              cursor: selected === null ? 'pointer' : 'default', textAlign:'left',
              transition:'all 0.15s', width:'100%',
            }}>
              <div style={{
                width:28, height:28, borderRadius:'50%', display:'flex',
                alignItems:'center', justifyContent:'center', flexShrink:0,
                fontSize:12, fontWeight:800,
                background: selected !== null && i === q.correct ? '#22c55e'
                  : selected === i && selected !== q.correct ? '#dc2626' : '#334155',
                color:'white',
              }}>
                {optLabel(i, selected, q.correct)}
              </div>
              <span style={{fontSize:13, color:s.color, lineHeight:1.5}}>{opt}</span>
            </button>
          );
        })}
      </div>
      {selected !== null && (
        <div className="anim-slide" style={{
          borderRadius:16, padding:14, marginBottom:14, fontSize:12,
          background: selected === q.correct ? 'rgba(21,128,61,0.15)' : '#1e293b',
          border: `1px solid ${selected === q.correct ? '#16a34a' : '#334155'}`,

        }}>

            {selected === q.correct ? '✅ 正確！' : '💡 解析：'}

        </div>
      )}
      {selected !== null && (
        <button onClick={next} className="anim-slide" style={{
          width:'100%', padding:'16px', borderRadius:20, fontWeight:800, fontSize:16,
          color:'#000', border:'none', cursor:'pointer',

        }}>
          {qIdx < scenario.quiz.length - 1 ? '下一題 →' : '查看結果 →'}
        </button>
      )}
    </div>
  );
};

// ── Simulation Phase ──────────────────────
const SimulationPhase = ({ scenario, onComplete }) => {
  var simSteps = SIM_STEPS[scenario.id] || [];
  var simCfg   = SIM_CONFIGS[scenario.id] || SIM_CFG_DEFAULT;

  var [stepIdx,   setStepIdx]   = useState(0);
  var [cockpit,   setCockpit]   = useState(simCfg.initCockpit);
  var [feedback,  setFeedback]  = useState(null);
  var [allDone,   setAllDone]   = useState(false);
  var [wheelAngle,setWheelAngle]= useState(0);
  // Track completed targets for button "on" states
  var [doneTgts,  setDoneTgts]  = useState(new Set());

  var dragging     = useRef(false);
  var dragStartX   = useRef(0);
  var feedbackLock = useRef(false);
  var stepIdxRef   = useRef(0);
  var cockpitRef   = useRef(simCfg.initCockpit);
  var allDoneRef   = useRef(false);
  var doneTgtsRef  = useRef(new Set());

  useEffect(function() { stepIdxRef.current  = stepIdx; },  [stepIdx]);
  useEffect(function() { cockpitRef.current  = cockpit; },  [cockpit]);
  useEffect(function() { allDoneRef.current  = allDone; },  [allDone]);
  useEffect(function() { doneTgtsRef.current = doneTgts; }, [doneTgts]);

  function triggerAction(target) {
    if (feedbackLock.current || allDoneRef.current) return;
    var idx   = stepIdxRef.current;
    var steps = SIM_STEPS[scenario.id] || [];
    var s     = steps[idx];
    if (!s || target !== s.target) {
      feedbackLock.current = true;
      setFeedback('wrong');
      setTimeout(function() { feedbackLock.current = false; setFeedback(null); }, 900);
      return;
    }
    feedbackLock.current = true;
    var newCockpit = Object.assign({}, cockpitRef.current, s.stateChange);
    setCockpit(newCockpit);
    cockpitRef.current = newCockpit;
    var newDone = new Set(doneTgtsRef.current);
    newDone.add(target);
    setDoneTgts(newDone);
    doneTgtsRef.current = newDone;
    setFeedback('success');
    setTimeout(function() {
      feedbackLock.current = false;
      setFeedback(null);
      if (idx < steps.length - 1) {
        setStepIdx(function(prev) { return prev + 1; });
      } else {
        setAllDone(true);
        allDoneRef.current = true;
      }
    }, 1500);
  }

  // Keyboard shortcuts
  useEffect(function() {
    function handler(e) {
      if (allDoneRef.current) return;
      var idx   = stepIdxRef.current;
      var steps = SIM_STEPS[scenario.id] || [];
      var s     = steps[idx];
      if (s && s.keys && s.keys.includes(e.key)) {
        triggerAction(s.target);
      }
    }
    window.addEventListener('keydown', handler);
    return function() { window.removeEventListener('keydown', handler); };
  }, []);

  // Steering wheel drag
  useEffect(function() {
    function onMove(e) {
      if (!dragging.current) return;
      var x = e.clientX !== undefined ? e.clientX : (e.touches && e.touches[0] ? e.touches[0].clientX : null);
      if (x === null) return;
      var delta = x - dragStartX.current;
      setWheelAngle(Math.max(-90, Math.min(90, delta * 0.7)));
      if (delta > 52) {
        dragging.current = false;
        setWheelAngle(0);
        triggerAction('wheel');
      }
    }
    function onUp() { if (dragging.current) { dragging.current = false; setWheelAngle(0); } }
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup',   onUp);
    window.addEventListener('touchmove', onMove, { passive: true });
    window.addEventListener('touchend',  onUp);
    return function() {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup',   onUp);
      window.removeEventListener('touchmove', onMove);
      window.removeEventListener('touchend',  onUp);
    };
  }, []);

  if (!simSteps.length) {
    return (
      <div className="anim-fade" style={{textAlign:'center', padding:'40px 20px'}}>
        <div style={{fontSize:48, marginBottom:16}}>🚧</div>
        <p style={{color:'#64748b', marginBottom:20, fontSize:14}}>此情境尚未開放模擬模式</p>
        <button onClick={onComplete} style={{background:'#f59e0b', color:'#000', border:'none', borderRadius:14, padding:'12px 28px', fontWeight:900, fontSize:14, cursor:'pointer'}}>繼續 →</button>
      </div>
    );
  }

  var step = simSteps[stepIdx];
  function isActive(tgt) { return !allDone && step && step.target === tgt; }
  function isDone(tgt)   { return doneTgts.has(tgt); }
  var keyHint = step ? step.keys.map(function(k) {
    return k === 'ArrowRight' ? '→' : k.toUpperCase();
  }).join(' / ') : '';
  var lb1 = simCfg.lb1;
  var lb2 = simCfg.lb2;

  return (
    <div className="anim-fade">

      {/* Progress header */}
      <div style={{background:'#0d1525', borderRadius:16, padding:'10px 14px', marginBottom:10, border:'1px solid #1e3a5f', display:'flex', alignItems:'center', justifyContent:'space-between'}}>
        <div>
          <div style={{color:'#f59e0b', fontSize:11, fontWeight:800, marginBottom:2, letterSpacing:'0.05em'}}>🎮 情境模擬</div>
          <div style={{color:'white', fontWeight:800, fontSize:13}}>
            {allDone ? '✓ 全部完成' : ('步驟 ' + (stepIdx+1) + '／' + simSteps.length + '：' + step.title)}
          </div>
        </div>
        <div style={{display:'flex', gap:5}}>
          {simSteps.map(function(_, i) {
            return <div key={i} style={{
              width:24, height:7, borderRadius:4,
              background: (i < stepIdx || allDone) ? '#22c55e' : i===stepIdx ? '#f59e0b' : '#1e3a5f',
              transition:'background 0.4s',
            }} />;
          })}
        </div>
      </div>

      {/* Instruction */}
      {!allDone && (
        <div style={{background:'rgba(245,158,11,0.08)', border:'1px solid rgba(245,158,11,0.28)', borderRadius:12, padding:'9px 14px', marginBottom:10, textAlign:'center'}}>
          <div style={{color:'#fbbf24', fontSize:13, fontWeight:800, marginBottom:3}}>{step.instruction}</div>
          <div style={{color:'#475569', fontSize:11}}>快捷鍵：<span style={{color:'#64748b', fontWeight:700}}>{keyHint}</span></div>
        </div>
      )}

      {/* ====== COCKPIT ====== */}
      <div style={{borderRadius:20, overflow:'hidden', border:'2px solid #1a3050', background:'#04080f', boxShadow:'inset 0 0 40px rgba(0,0,0,0.8)'}}>

        {/* WINDSHIELD */}
        <div style={{height:180, position:'relative', overflow:'hidden'}}>
          <SimWindshield cockpit={cockpit} foggy={simCfg.foggy} />
          <div style={{position:'absolute',top:0,left:0,bottom:0,width:26,background:'linear-gradient(to right,#04080f,transparent)',pointerEvents:'none'}} />
          <div style={{position:'absolute',top:0,right:0,bottom:0,width:26,background:'linear-gradient(to left,#04080f,transparent)',pointerEvents:'none'}} />
          <div style={{position:'absolute',bottom:0,left:0,right:0,height:22,background:'linear-gradient(to top,#04080f,transparent)',pointerEvents:'none'}} />
        </div>

        {/* INTERIOR PANEL */}
        <div style={{background:'#07101e', borderTop:'1px solid #1a3050', padding:'12px 14px 10px'}}>

          {/* Row 1: Speedometer + Center buttons + Right info */}
          <div style={{display:'flex', gap:10, alignItems:'flex-start', marginBottom:12}}>

            {/* Speedometer */}
            <div style={{flexShrink:0}}>
              <SimSpeedometer speed={cockpit.speed} />
            </div>

            {/* Center button cluster */}
            <div style={{flex:1, display:'flex', flexDirection:'column', gap:7, alignItems:'center', paddingTop:4}}>
              <div style={{display:'flex', gap:8}}>
                <SimButton label="⚠"  sublabel="雙黃燈"
                  active={isActive('hazard')} on={isDone('hazard')} color="#f59e0b"
                  onClick={function() { triggerAction('hazard'); }} />
                <SimButton label="🔆" sublabel="霧燈"
                  active={isActive('fog')} on={isDone('fog')} color="#60a5fa"
                  onClick={function() { triggerAction('fog'); }} />
              </div>
              <div style={{display:'flex', gap:8}}>
                <SimButton label="📢" sublabel="喇叭"
                  active={isActive('horn')} on={isDone('horn')} color="#a78bfa"
                  onClick={function() { triggerAction('horn'); }} />
                <SimButton label="💧" sublabel="雨刷"
                  active={isActive('wiper')} on={isDone('wiper')} color="#67e8f9"
                  onClick={function() { triggerAction('wiper'); }} />
              </div>
            </div>

            {/* Right: warning lights */}
            <div style={{flexShrink:0, display:'flex', flexDirection:'column', gap:6, alignItems:'flex-end'}}>
              <div style={{background:'#060b14', border:'1px solid #1a3050', borderRadius:8, padding:'4px 10px', textAlign:'center', minWidth:44}}>
                <div style={{color:'#2d4a6e', fontSize:9, marginBottom:1}}>排檔</div>
                <div style={{color: cockpit.gearDown ? '#22c55e' : '#f59e0b', fontSize:22, fontWeight:900, lineHeight:1}}>
                  {cockpit.gearDown ? '2' : 'D'}
                </div>
              </div>
              <div style={{display:'flex', flexWrap:'wrap', gap:4, justifyContent:'flex-end', maxWidth:70}}>
                {[
                  {icon:'⚠️', on: cockpit.hazardOn, tip:'雙黃'},
                  {icon:'⚙️', on: true,             tip:'引擎'},
                  {icon:'💡', on: cockpit.fogOn,    tip:'霧燈'},
                  {icon:'⛽', on: false,             tip:'油量'},
                ].map(function(w, i) {
                  return (
                    <div key={i} title={w.tip} style={{
                      width:22, height:22, borderRadius:5,
                      background: w.on ? 'rgba(245,158,11,0.2)' : '#060b14',
                      border: w.on ? '1px solid #f59e0b' : '1px solid #1a3050',
                      display:'flex', alignItems:'center', justifyContent:'center', fontSize:11,
                      animation: (w.on && w.tip==='雙黃') ? 'hazard 0.75s ease-in-out infinite' : 'none',
                    }}>{w.icon}</div>
                  );
                })}
              </div>
            </div>
          </div>

          {/* Row 2: Left stalk + Steering wheel + Gear shifter */}
          <div style={{display:'flex', gap:10, alignItems:'center', marginBottom:10, justifyContent:'space-between'}}>

            {/* LEFT STALK: lb1 + lb2 (scenario-specific) */}
            <div style={{display:'flex', flexDirection:'column', gap:8, flexShrink:0}}>
              <SimButton
                label={lb1.icon} sublabel={lb1.label}
                active={isActive(lb1.target)} on={isDone(lb1.target)} color={lb1.color}
                onClick={function() { triggerAction(lb1.target); }} size="sm"
              />
              <SimButton
                label={lb2.icon} sublabel={lb2.label}
                active={isActive(lb2.target)} on={isDone(lb2.target)} color={lb2.color}
                onClick={function() { triggerAction(lb2.target); }} size="sm"
              />
            </div>

            {/* Steering wheel */}
            <div style={{flex:1, display:'flex', justifyContent:'center'}}>
              <SimWheel
                angle={wheelAngle}
                active={isActive('wheel')}
                activeGrip={isActive('wheel-grip')}
                doneGrip={isDone('wheel-grip')}
                onHubClick={function() { triggerAction('wheel-grip'); }}
                onMouseDown={function(e) {
                  if (isActive('wheel')) { dragging.current=true; dragStartX.current=e.clientX; e.preventDefault(); }
                  else if (isActive('wheel-grip')) { triggerAction('wheel-grip'); }
                }}
                onTouchStart={function(e) {
                  if (isActive('wheel')) { dragging.current=true; dragStartX.current=e.touches[0].clientX; }
                  else if (isActive('wheel-grip')) { triggerAction('wheel-grip'); }
                }}
              />
            </div>

            {/* Gear shifter */}
            <div style={{flexShrink:0}}>
              <SimGearShifter
                activeGearDown={isActive('gear-down')}
                doneGearDown={isDone('gear-down')}
                onGearDown={function() { triggerAction('gear-down'); }}
              />
            </div>
          </div>

          {/* Row 3: Pedals */}
          <div style={{display:'flex', justifyContent:'flex-start', paddingLeft:8}}>
            <SimPedals
              activeBrake={isActive('brake')}
              activeGas={isActive('gas')}
              doneBrake={isDone('brake')}
              doneGas={isDone('gas')}
              onBrakeClick={function() { triggerAction('brake'); }}
              onGasClick={function() { triggerAction('gas'); }}
            />
          </div>
        </div>
      </div>

      {/* Feedback overlay */}
      {feedback && (
        <div style={{
          position:'fixed', top:'50%', left:'50%', transform:'translate(-50%,-50%)',
          background: feedback==='success' ? 'rgba(21,128,61,0.97)' : 'rgba(185,28,28,0.97)',
          borderRadius:22, padding:'20px 32px', zIndex:9999, textAlign:'center',
          boxShadow:'0 24px 70px rgba(0,0,0,0.8)', minWidth:220, pointerEvents:'none',
        }}>
          <div style={{fontSize:38, marginBottom:8, lineHeight:1}}>{feedback==='success' ? '✓' : '✗'}</div>
          <div style={{color:'white', fontWeight:800, fontSize:14, lineHeight:1.6}}>
            {feedback==='success' ? step.successMsg : '不是這個，再試試！'}
          </div>
        </div>
      )}

      {/* Completion card */}
      {allDone && (
        <div className="anim-fade" style={{marginTop:14}}>
          <div style={{background:'rgba(34,197,94,0.08)', border:'1px solid rgba(34,197,94,0.3)', borderRadius:20, padding:22, marginBottom:14, textAlign:'center'}}>
            <div style={{fontSize:46, marginBottom:10}}>🎉</div>
            <div style={{color:'#4ade80', fontWeight:900, fontSize:18, marginBottom:6}}>模擬完成！</div>
            <div style={{color:'#64748b', fontSize:13}}>你成功完成所有緊急應變步驟</div>
          </div>
          <button onClick={onComplete} style={{
            width:'100%', padding:'14px 0',
            background:'linear-gradient(135deg,#22c55e,#16a34a)',
            border:'none', borderRadius:16, color:'white',
            fontWeight:900, fontSize:15, cursor:'pointer',
            boxShadow:'0 6px 24px rgba(34,197,94,0.35)',
          }}>查看最終成績 →</button>
        </div>
      )}
    </div>
  );
};

// ── Result Phase ──────────────────────────
const ResultPhase = ({ scenario, score, total, onHome, onRetry }) => {
  const pct = Math.round(score / total * 100);
  const grade = pct >= 80 ? {label:'優秀', color:'#4ade80', emoji:'🏆', sub:'你已掌握此情境的應對方式！'}
              : pct >= 60 ? {label:'良好', color:'#fbbf24', emoji:'👍', sub:'再複習一次，加深記憶'}
              : {label:'需要加強', color:'#f87171', emoji:'📚', sub:'建議重新學習一次流程'};
  return (
    <div className="anim-fade" style={{textAlign:'center'}}>
      <div style={{fontSize:60, marginBottom:12}}>{grade.emoji}</div>
      <div style={{fontSize:22, fontWeight:900, color:grade.color, marginBottom:4}}>{grade.label}</div>
      <div style={{fontSize:48, fontWeight:900, color:'white', marginBottom:4}}>{pct}<span style={{fontSize:20}}>%</span></div>
      <div style={{color:'#64748b', fontSize:13, marginBottom:6}}>{score} ／ {total} 題答對</div>
      <div style={{color:'#94a3b8', fontSize:12, marginBottom:24}}>{grade.sub}</div>
      <div style={{background:'#1e293b', borderRadius:20, padding:18, marginBottom:20, textAlign:'left', border:'1px solid #334155'}}>
        <div style={{color:'#f59e0b', fontWeight:700, fontSize:12, marginBottom:12}}>🔑 記住這個情境的關鍵步驟</div>
        {scenario.steps.slice(0,4).map((s, i) => (
          <div key={i} style={{display:'flex', alignItems:'center', gap:10, marginBottom:8}}>
            <span style={{fontSize:16}}>{s.icon}</span>
            <span style={{color:'#cbd5e1', fontSize:12}}>{s.title}</span>
          </div>
        ))}
        {scenario.steps.length > 4 && (
          <div style={{color:'#475569', fontSize:11, marginTop:4}}>...共 {scenario.steps.length} 個步驟</div>
        )}
      </div>
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
        <button onClick={onRetry} style={{
          padding:'14px', borderRadius:18, fontWeight:800, color:'white',
          background:'transparent', border:'1px solid #475569', cursor:'pointer',
          fontSize:14, transition:'border-color 0.15s',
        }}
        onMouseEnter={e => e.currentTarget.style.borderColor='#f59e0b'}
        onMouseLeave={e => e.currentTarget.style.borderColor='#475569'}
        >🔄 再試一次</button>
        <button onClick={onHome} style={{
          padding:'14px', borderRadius:18, fontWeight:800, color:'#000',
          border:'none', cursor:'pointer', fontSize:14,
          background:'linear-gradient(135deg,#f59e0b,#d97706)',
        }}>🏠 返回首頁</button>
      </div>
    </div>
  );
};

// ─────────────────────────────────────────
// SCENARIO FLOW
// ─────────────────────────────────────────
// ── Review Picker (for completed scenarios) ──
const REVIEW_PHASES = [
  { id: 'intro',       label: '情境介紹', icon: '📖', desc: '重新閱讀情境故事與人物背景' },
  { id: 'decision',    label: '緊急決策', icon: '🤔', desc: '重做決策選擇，看看不同後果' },
  { id: 'consequence', label: '後果說明', icon: '⚡', desc: '查看正確決策的分析說明' },
  { id: 'learning',    label: '教學步驟', icon: '📚', desc: '複習正確的緊急應對流程' },
  { id: 'quiz',        label: '知識測驗', icon: '📝', desc: '再次挑戰知識測驗題目' },
  { id: 'simulation',  label: '情境模擬', icon: '🎮', desc: '重新操作駕駛艙互動模擬' },
  { id: 'result',      label: '查看成績', icon: '🏆', desc: '重溫上次的測驗成績' },
];

const ReviewPicker = ({ scenario, onPick, onRestart }) => {
  return (
    <div className="anim-fade">
      {/* Header */}
      <div style={{textAlign:'center', marginBottom:20}}>
        <div style={{fontSize:44, marginBottom:10}}>✅</div>
        <div style={{color:'#4ade80', fontWeight:900, fontSize:19, marginBottom:6}}>已完成此情境</div>
        <div style={{color:'#64748b', fontSize:13}}>選擇想複習的環節，或從頭再來一遍</div>
      </div>

      {/* Phase cards */}
      <div style={{display:'flex', flexDirection:'column', gap:8, marginBottom:14}}>
        {REVIEW_PHASES.map(function(p, idx) {
          var noSim = p.id === 'simulation' && !(SIM_STEPS[scenario.id] && SIM_STEPS[scenario.id].length);
          return (
            <button
              key={p.id}
              onClick={function() { if (!noSim) onPick(p.id); }}
              disabled={noSim}
              style={{
                display:'flex', alignItems:'center', gap:14, padding:'12px 16px',
                background:'#1e293b', borderRadius:16, border:'1px solid #334155',
                cursor: noSim ? 'not-allowed' : 'pointer', width:'100%', textAlign:'left',
                opacity: noSim ? 0.35 : 1, transition:'border-color 0.15s, background 0.15s',
              }}
              onMouseEnter={function(e) { if (!noSim) { e.currentTarget.style.borderColor='#f59e0b'; e.currentTarget.style.background='rgba(245,158,11,0.05)'; }}}
              onMouseLeave={function(e) { e.currentTarget.style.borderColor='#334155'; e.currentTarget.style.background='#1e293b'; }}
            >
              {/* Step number badge */}
              <div style={{
                width:22, height:22, borderRadius:'50%', background:'#0f172a',
                border:'1px solid #334155', display:'flex', alignItems:'center',
                justifyContent:'center', fontSize:10, fontWeight:800, color:'#475569',
                flexShrink:0,
              }}>{idx + 1}</div>
              {/* Icon */}
              <div style={{
                width:40, height:40, borderRadius:12, background:'#0f172a',
                border:'1px solid #334155', display:'flex', alignItems:'center',
                justifyContent:'center', fontSize:20, flexShrink:0,
              }}>{p.icon}</div>
              {/* Text */}
              <div style={{flex:1, minWidth:0}}>
                <div style={{color:'white', fontWeight:700, fontSize:14}}>{p.label}</div>
                <div style={{color:'#475569', fontSize:11.5, marginTop:2}}>{p.desc}</div>
              </div>
              <div style={{color:'#334155', fontSize:18, flexShrink:0}}>›</div>
            </button>
          );
        })}
      </div>

      {/* Restart button */}
      <button
        onClick={onRestart}
        style={{
          width:'100%', padding:'13px', background:'transparent',
          border:'1px solid #475569', borderRadius:14, color:'#94a3b8',
          fontWeight:700, fontSize:14, cursor:'pointer', transition:'all 0.15s',
        }}
        onMouseEnter={function(e) { e.currentTarget.style.borderColor='#f59e0b'; e.currentTarget.style.color='#f59e0b'; }}
        onMouseLeave={function(e) { e.currentTarget.style.borderColor='#475569'; e.currentTarget.style.color='#94a3b8'; }}
      >🔄 從頭開始</button>
    </div>
  );
};

// ─────────────────────────────────────────
// SCENARIO FLOW
// ─────────────────────────────────────────
const ScenarioFlow = ({ scenario, onBack, onComplete, isCompleted }) => {
  const [phase, setPhase] = useState(isCompleted ? 'pick' : 'intro');
  const [choice, setChoice] = useState(null);
  const [quizResult, setQuizResult] = useState(null);

  const handleDecide = (opt) => { setChoice(opt); setPhase('consequence'); };
  const handleQuizDone = (score, total) => {
    setQuizResult({ score, total });
    if (SIM_STEPS[scenario.id] && SIM_STEPS[scenario.id].length > 0) {
      setPhase('simulation');
    } else {
      setPhase('result');
      onComplete(scenario.id);
    }
  };
  const handleSimDone = () => { setPhase('result'); onComplete(scenario.id); };
  const handleRetry  = () => { setPhase('intro'); setChoice(null); setQuizResult(null); };

  // Jump to any phase directly (review mode)
  const handlePick = (targetPhase) => {
    // Phases that need prior state: seed sensible defaults
    if (targetPhase === 'consequence') {
      // Show the correct/first option's consequence
      const opts = scenario.decision.options;
      setChoice(opts.find(function(o) { return o.correct; }) || opts[0]);
    }
    if (targetPhase === 'result') {
      // Use a full score as placeholder if no real result stored
      if (!quizResult) setQuizResult({ score: scenario.quiz.length, total: scenario.quiz.length });
    }
    setPhase(targetPhase);
  };

  const handleRestart = () => { setPhase('intro'); setChoice(null); setQuizResult(null); };

  // Show "複習模式" chip in header when completed and mid-flow
  const inReview = isCompleted && phase !== 'pick';

  return (
    <div style={{minHeight:'100vh', padding:'16px', background:'linear-gradient(160deg,#0f172a,#1e293b)'}}>
      <div style={{maxWidth:520, margin:'0 auto'}}>

        {/* Header */}
        <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:16}}>
          <button onClick={phase === 'pick' ? onBack : function() { setPhase('pick'); }}
            style={{
              background:'transparent', border:'1px solid #334155', borderRadius:12,
              color:'#94a3b8', padding:'6px 12px', cursor:'pointer', fontSize:13,
              transition:'color 0.15s, border-color 0.15s', flexShrink:0,
            }}
            onMouseEnter={function(e) { e.currentTarget.style.color='white'; e.currentTarget.style.borderColor='#64748b'; }}
            onMouseLeave={function(e) { e.currentTarget.style.color='#94a3b8'; e.currentTarget.style.borderColor='#334155'; }}
          >
            {(phase === 'pick' || !isCompleted) ? '← 返回' : '☰ 選單'}
          </button>
          <div style={{color:'white', fontWeight:800, fontSize:15, flex:1, minWidth:0, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{scenario.title}</div>
          {inReview && (
            <div style={{
              background:'rgba(34,197,94,0.15)', border:'1px solid rgba(34,197,94,0.4)',
              borderRadius:20, padding:'3px 10px', fontSize:11, color:'#4ade80', fontWeight:700, flexShrink:0,
            }}>複習中</div>
          )}
        </div>

        {/* Phase bar — hidden on picker screen */}
        {phase !== 'pick' && <PhaseBar phase={phase} />}

        {phase === 'pick'        && <ReviewPicker scenario={scenario} onPick={handlePick} onRestart={handleRestart} />}
        {phase === 'intro'       && <IntroPhase scenario={scenario} onNext={() => setPhase('decision')} />}
        {phase === 'decision'    && <DecisionPhase scenario={scenario} onDecide={handleDecide} />}
        {phase === 'consequence' && choice && <ConsequencePhase scenario={scenario} choice={choice} onNext={() => setPhase('learning')} />}
        {phase === 'learning'    && <LearningPhase scenario={scenario} onNext={() => setPhase('quiz')} />}
        {phase === 'quiz'        && <QuizPhase scenario={scenario} onComplete={handleQuizDone} />}
        {phase === 'simulation'  && <SimulationPhase scenario={scenario} onComplete={handleSimDone} />}
        {phase === 'result'      && quizResult && (
          <ResultPhase scenario={scenario} score={quizResult.score} total={quizResult.total}
            onHome={onBack} onRetry={handleRetry} />
        )}
      </div>
    </div>
  );
};

// ─────────────────────────────────────────
// ROOT APP
// ─────────────────────────────────────────
const App = () => {
  const [view, setView] = useState('home');
  const [current, setCurrent] = useState(null);
  const [completed, setCompleted] = useState([]);

  const select = (sc) => { setCurrent(sc); setView('scenario'); };
  const complete = (id) => setCompleted(prev => prev.includes(id) ? prev : [...prev, id]);
  const back = () => { setView('home'); setCurrent(null); };

  if (view === 'scenario' && current) {
    return <ScenarioFlow scenario={current} onBack={back} onComplete={complete} isCompleted={completed.includes(current.id)} />;
  }
  return <HomeScreen onSelect={select} completed={completed} />;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
