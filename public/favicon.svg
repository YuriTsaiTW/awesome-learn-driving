<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background tile -->
  <rect width="32" height="32" rx="7" fill="#0f172a"/>
  <!-- Road stripe -->
  <rect x="0" y="28" width="32" height="4" rx="0" fill="#1e293b"/>
  <rect x="13" y="29" width="6" height="2" rx="1" fill="#475569"/>
  <!-- Car body -->
  <rect x="3" y="16" width="26" height="10" rx="2" fill="#1d4ed8"/>
  <!-- Cabin -->
  <rect x="8" y="8" width="16" height="10" rx="3" fill="#1e40af"/>
  <!-- Windshield (front) -->
  <rect x="9" y="9.5" width="6.5" height="6.5" rx="1.5" fill="#93c5fd" opacity="0.75"/>
  <!-- Rear window -->
  <rect x="17" y="9.5" width="5.5" height="6.5" rx="1.5" fill="#93c5fd" opacity="0.55"/>
  <!-- Headlight -->
  <rect x="27.5" y="18.5" width="2.5" height="2" rx="0.8" fill="#fef08a"/>
  <!-- Tail light -->
  <rect x="2" y="18.5" width="2" height="2" rx="0.8" fill="#ef4444"/>
  <!-- Front wheel outer -->
  <circle cx="22" cy="26" r="4.5" fill="#111827"/>
  <!-- Front wheel inner hub -->
  <circle cx="22" cy="26" r="2.2" fill="#334155"/>
  <!-- Rear wheel outer -->
  <circle cx="10" cy="26" r="4.5" fill="#111827"/>
  <!-- Rear wheel inner hub -->
  <circle cx="10" cy="26" r="2.2" fill="#334155"/>
</svg>
